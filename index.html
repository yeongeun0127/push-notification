<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>푸시 알림 사용자 경험 조사</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F4F1; min-height: 100vh; padding: 2rem 1rem 4rem; }
.survey-wrap { max-width: 560px; margin: 0 auto; }

/* 표지 */
.cover-card {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 2px 20px rgba(0,0,0,0.07);
}
.cover-top {
  background: #534AB7;
  padding: 3rem 2.5rem 2.5rem;
  text-align: center;
}
.cover-icon {
  width: 64px; height: 64px; border-radius: 18px;
  background: rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.5rem; font-size: 28px;
}
.cover-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.6); text-transform: uppercase; margin-bottom: 12px;
}
.cover-title {
  font-size: 26px; font-weight: 700; color: #fff;
  line-height: 1.35; margin-bottom: 10px;
}
.cover-subtitle { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.6; }
.cover-body { padding: 2rem 2.5rem; }
.cover-info-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 1.75rem;
}
.cover-info-item {
  background: #F5F4F1; border-radius: 10px; padding: 14px 16px;
}
.cover-info-label { font-size: 11px; color: #A09E98; font-weight: 600; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.cover-info-value { font-size: 14px; font-weight: 600; color: #1A1917; }
.cover-notice {
  background: #EEEDFE; border-radius: 10px; padding: 14px 16px;
  font-size: 13px; color: #534AB7; line-height: 1.6; margin-bottom: 1.75rem;
}
.cover-notice strong { font-weight: 700; }
.btn-start {
  width: 100%; padding: 14px;
  background: #534AB7; color: #fff;
  border: none; border-radius: 12px;
  font-size: 16px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: opacity 0.15s;
  margin-bottom: 10px;
}
.btn-start:hover { opacity: 0.88; }
.btn-researcher {
  width: 100%; padding: 11px;
  background: none; color: #A09E98;
  border: 1px solid rgba(0,0,0,0.1); border-radius: 12px;
  font-size: 13px; font-family: inherit;
  cursor: pointer; transition: background 0.15s;
}
.btn-researcher:hover { background: #F5F4F1; color: #6B6A66; }

/* 결과 페이지 */
.result-page { display: none; }
.result-card {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 2px 20px rgba(0,0,0,0.07);
}
.result-header {
  background: #1A1917; padding: 1.5rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
}
.result-header-title { font-size: 16px; font-weight: 700; color: #fff; }
.result-badge {
  font-size: 10px; font-weight: 700; padding: 4px 10px;
  border-radius: 99px; background: #FAEEDA; color: #854F0B;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.result-body { padding: 1.5rem 2rem; }
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
.stat-card { background: #F5F4F1; border-radius: 10px; padding: 14px; text-align: center; }
.stat-num { font-size: 26px; font-weight: 700; color: #1A1917; }
.stat-lbl { font-size: 11px; color: #A09E98; margin-top: 3px; }
.tab-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.tab-btn {
  padding: 7px 16px; font-size: 12px; font-weight: 600; font-family: inherit;
  border: 1px solid rgba(0,0,0,0.12); border-radius: 99px;
  background: none; color: #6B6A66; cursor: pointer; transition: all 0.12s;
}
.tab-btn.on { background: #1A1917; color: #fff; border-color: #1A1917; }
.tab-btn:hover:not(.on) { background: #F5F4F1; }
.r-section-label {
  font-size: 11px; font-weight: 700; color: #A09E98;
  text-transform: uppercase; letter-spacing: 0.07em;
  margin-bottom: 10px; margin-top: 16px;
}
.r-section-label:first-child { margin-top: 0; }
.result-table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
.result-table th {
  text-align: left; font-weight: 700; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.05em; color: #A09E98;
  padding: 8px 6px; border-bottom: 1px solid rgba(0,0,0,0.08);
}
.result-table td { padding: 10px 6px; border-bottom: 1px solid rgba(0,0,0,0.06); color: #6B6A66; vertical-align: middle; }
.result-table tr:last-child td { border-bottom: none; }
.bar-row { display: flex; align-items: center; gap: 6px; }
.bar-track { flex: 1; height: 5px; border-radius: 99px; background: rgba(0,0,0,0.08); }
.bar-fill { height: 100%; border-radius: 99px; background: #534AB7; transition: width 0.5s ease; }
.bar-pct { font-size: 11px; color: #6B6A66; min-width: 30px; text-align: right; }
.tag { font-size: 10px; padding: 3px 8px; border-radius: 99px; font-weight: 700; white-space: nowrap; }
.tag-formal { background: #E6F1FB; color: #185FA5; }
.tag-casual { background: #FAEEDA; color: #854F0B; }
.tag-name   { background: #E1F5EE; color: #0F6E56; }
.tag-none   { background: #F0EFE9; color: #A09E98; }
.filter-bar { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px; background: #F5F4F1; border-radius: 10px; margin-bottom: 12px; }
.filter-chip {
  padding: 5px 13px; border-radius: 99px; font-size: 12px; font-weight: 600;
  font-family: inherit; border: 1px solid rgba(0,0,0,0.12);
  background: #fff; color: #6B6A66; cursor: pointer; transition: all 0.12s;
}
.filter-chip.on { background: #534AB7; color: #fff; border-color: #534AB7; }
.filter-chip:hover:not(.on) { background: rgba(0,0,0,0.05); }
.resp-item { background: #F5F4F1; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.resp-name { font-size: 13px; font-weight: 700; color: #1A1917; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
.resp-meta { font-size: 11px; color: #A09E98; font-weight: 400; }
.resp-pick { font-size: 11px; padding: 3px 9px; border-radius: 99px; background: #EEEDFE; color: #534AB7; font-weight: 700; }
.empty-state { font-size: 13px; color: #A09E98; text-align: center; padding: 30px 0; }
.divider { height: 1px; background: rgba(0,0,0,0.08); margin: 16px 0; }
.btn-logout {
  width: 100%; padding: 11px; background: none; color: #6B6A66;
  border: 1px solid rgba(0,0,0,0.12); border-radius: 10px;
  font-size: 13px; font-family: inherit; cursor: pointer;
}
.btn-logout:hover { background: #F5F4F1; }

/* 로그인 */
.login-card {
  background: #fff; border: 1px solid rgba(0,0,0,0.1);
  border-radius: 20px; padding: 2rem;
  box-shadow: 0 2px 20px rgba(0,0,0,0.07);
}
.login-title { font-size: 18px; font-weight: 700; color: #1A1917; margin-bottom: 6px; }
.login-sub { font-size: 13px; color: #6B6A66; margin-bottom: 1.5rem; }
.login-error { font-size: 12px; color: #C0392B; margin-top: 6px; display: none; }

/* 설문 */
.survey-card {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 2px 20px rgba(0,0,0,0.07);
}
.section-header { padding: 1.25rem 2rem 1rem; border-bottom: 1px solid rgba(0,0,0,0.07); }
.section-badge {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 99px; margin-bottom: 6px;
}
.badge-basic   { background: #E6F1FB; color: #185FA5; border: 1px solid #85B7EB; }
.badge-main    { background: #EEEDFE; color: #534AB7; border: 1px solid #AFA9EC; }
.badge-pref    { background: #FBEAF0; color: #993556; border: 1px solid #ED93B1; }
.badge-compare { background: #E1F5EE; color: #0F6E56; border: 1px solid #5DCAA5; }
.badge-closing { background: #FAEEDA; color: #854F0B; border: 1px solid #EF9F27; }
.section-title { font-size: 15px; font-weight: 700; color: #1A1917; }
.section-desc  { font-size: 12px; color: #6B6A66; margin-top: 2px; }
.progress-row {
  display: flex; align-items: center; gap: 6px;
  padding: 0.9rem 2rem; border-bottom: 1px solid rgba(0,0,0,0.07);
  background: #F5F4F1;
}
.prog-seg { height: 4px; border-radius: 99px; background: rgba(0,0,0,0.1); overflow: hidden; flex-shrink: 0; }
.prog-fill { height: 100%; border-radius: 99px; transition: width 0.35s ease; }
.fill-blue   { background: #378ADD; }
.fill-purple { background: #534AB7; }
.fill-pink   { background: #D4537E; }
.fill-teal   { background: #1D9E75; }
.fill-amber  { background: #BA7517; }
.prog-sep   { font-size: 11px; color: #A09E98; flex-shrink: 0; }
.prog-label { font-size: 11px; color: #A09E98; white-space: nowrap; flex-shrink: 0; margin-left: 4px; }
.card-body { padding: 1.75rem 2rem; }
.q-title-row { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 6px; margin-bottom: 6px; }
.q-text { font-size: 17px; font-weight: 700; color: #1A1917; line-height: 1.5; }
.q-sub  { font-size: 13px; color: #6B6A66; margin-bottom: 1.25rem; line-height: 1.5; }
.q-hint { font-size: 12px; color: #A09E98; margin-bottom: 1.25rem; }
.q-spacer { margin-bottom: 1.25rem; }
.option-list { display: flex; flex-direction: column; gap: 9px; }
.option-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border: 1px solid rgba(0,0,0,0.12);
  border-radius: 10px; background: #fff;
  cursor: pointer; font-size: 14px; color: #1A1917;
  text-align: left; transition: background 0.12s, border-color 0.12s; width: 100%;
  font-family: inherit;
}
.option-btn:hover { background: #F5F4F1; }
.sel-blue   { background: #E6F1FB !important; border-color: #378ADD !important; color: #0C447C !important; }
.sel-purple { background: #EEEDFE !important; border-color: #7F77DD !important; color: #3C3489 !important; }
.sel-pink   { background: #FBEAF0 !important; border-color: #D4537E !important; color: #72243E !important; }
.sel-teal   { background: #E1F5EE !important; border-color: #1D9E75 !important; color: #085041 !important; }
.sel-amber  { background: #FAEEDA !important; border-color: #BA7517 !important; color: #633806 !important; }
.radio-dot {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,0.2);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
}
.sel-blue   .radio-dot { border-color: #378ADD; background: #378ADD; }
.sel-purple .radio-dot { border-color: #7F77DD; background: #7F77DD; }
.sel-pink   .radio-dot { border-color: #D4537E; background: #D4537E; }
.sel-teal   .radio-dot { border-color: #1D9E75; background: #1D9E75; }
.sel-amber  .radio-dot { border-color: #BA7517; background: #BA7517; }
.radio-inner { width: 8px; height: 8px; border-radius: 50%; background: white; display: none; }
.sel-blue .radio-inner, .sel-purple .radio-inner, .sel-pink .radio-inner,
.sel-teal .radio-inner, .sel-amber .radio-inner { display: block; }
.check-box {
  width: 18px; height: 18px; border-radius: 4px;
  border: 1.5px solid rgba(0,0,0,0.2);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
}
.sel-purple .check-box { border-color: #7F77DD; background: #7F77DD; }
.sel-teal   .check-box { border-color: #1D9E75; background: #1D9E75; }
.check-inner { width: 10px; height: 10px; display: none; }
.sel-purple .check-inner, .sel-teal .check-inner { display: block; }
.text-input, .text-area {
  width: 100%; padding: 12px 14px;
  border: 1px solid rgba(0,0,0,0.12);
  border-radius: 10px; background: #F5F4F1;
  font-size: 14px; color: #1A1917;
  font-family: inherit; line-height: 1.6; outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.text-area { min-height: 100px; resize: vertical; }
.text-input:focus, .text-area:focus { border-color: #534AB7; background: #fff; }
.text-input::placeholder, .text-area::placeholder { color: #A09E98; }
.optional-badge {
  display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px;
  background: #F0EFE9; color: #A09E98; border: 1px solid rgba(0,0,0,0.1);
  vertical-align: middle; white-space: nowrap;
}
.limit-badge {
  display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px;
  background: #FAEEDA; color: #854F0B; border: 1px solid #EF9F27;
  vertical-align: middle; white-space: nowrap; flex-shrink: 0;
}
.info-box {
  background: #FAEEDA; border: 1px solid #EF9F27;
  border-radius: 10px; padding: 12px 14px;
  font-size: 13px; color: #633806; margin-bottom: 1.25rem; line-height: 1.6;
}
.optional-note { font-size: 11px; color: #A09E98; margin-top: 8px; }
.name-example {
  display: flex; align-items: center; gap: 8px;
  background: #F5F4F1; border-radius: 10px; padding: 10px 14px;
  margin-bottom: 12px; font-size: 13px; color: #6B6A66;
}
.name-example-arrow { color: #A09E98; }
.name-example-highlight { font-weight: 700; color: #993556; }
.nav-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.25rem 2rem; border-top: 1px solid rgba(0,0,0,0.07);
}
.btn-back {
  font-size: 13px; color: #6B6A66;
  background: none; border: none; cursor: pointer; padding: 8px 4px; font-family: inherit;
}
.btn-back:hover { color: #1A1917; }
.btn-next {
  font-size: 14px; font-weight: 700; padding: 10px 28px;
  border-radius: 10px; color: white; border: none;
  cursor: pointer; transition: opacity 0.15s; font-family: inherit;
}
.btn-next:disabled { opacity: 0.35; cursor: default; }
.btn-next:not(:disabled):hover { opacity: 0.85; }
.btn-blue   { background: #185FA5; }
.btn-purple { background: #534AB7; }
.btn-pink   { background: #993556; }
.btn-teal   { background: #0F6E56; }
.btn-amber  { background: #854F0B; }
.notif-list { display: flex; flex-direction: column; gap: 10px; }
.notif-card {
  background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 14px;
  padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start;
  cursor: pointer; transition: border-color 0.15s, background 0.15s;
}
.notif-card:hover { border-color: rgba(0,0,0,0.2); background: #F5F4F1; }
.notif-card.notif-selected { border-color: #D4537E; background: #FBEAF0; }
.notif-card.notif-selected .notif-radio { border-color: #D4537E; background: #D4537E; }
.notif-card.notif-selected .notif-radio-inner { display: block; }
.notif-app-icon {
  width: 44px; height: 44px; border-radius: 10px;
  background: #F0EFE9; border: 1px solid rgba(0,0,0,0.08);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.notif-body { flex: 1; min-width: 0; }
.notif-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 3px; }
.notif-title-text { font-size: 13px; font-weight: 700; color: #1A1917; line-height: 1.4; }
.notif-time { font-size: 11px; color: #A09E98; white-space: nowrap; flex-shrink: 0; }
.notif-msg { font-size: 12px; color: #6B6A66; line-height: 1.55; }
.notif-ad { font-size: 11px; color: #A09E98; }
.notif-unsub { font-size: 10px; color: #A09E98; margin-top: 4px; }
.notif-radio {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,0.2); flex-shrink: 0; margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
}
.notif-radio-inner { width: 8px; height: 8px; border-radius: 50%; background: white; display: none; }
.thank-wrap { padding: 2rem; text-align: center; }
.thank-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: #EAF3DE; border: 1px solid #97C459;
  display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem;
}
.thank-title { font-size: 21px; font-weight: 700; color: #1A1917; margin-bottom: 8px; }
.thank-msg { font-size: 15px; color: #6B6A66; line-height: 1.7; margin-bottom: 1.75rem; }
.res-section { margin-bottom: 14px; text-align: left; }
.res-section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
  color: #A09E98; margin-bottom: 6px; text-transform: uppercase;
}
.res-box { background: #F5F4F1; border-radius: 10px; padding: 10px 14px; }
.res-row {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 6px 0; font-size: 13px; gap: 12px;
  border-bottom: 1px solid rgba(0,0,0,0.07);
}
.res-row:last-child { border-bottom: none; }
.res-q { color: #6B6A66; flex: 1; }
.res-a { font-weight: 700; color: #1A1917; text-align: right; max-width: 60%; }
.res-a.empty { color: #A09E98; font-weight: 400; font-style: italic; }
.btn-restart {
  font-size: 13px; padding: 9px 22px; border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.12); background: #fff; color: #1A1917;
  cursor: pointer; margin-top: 4px; font-family: inherit;
}
.btn-restart:hover { background: #F5F4F1; }

.page { display: none; }
.page.active { display: block; }
</style>
</head>
<body>
<div class="survey-wrap">

  <!-- 표지 -->
  <div class="page active" id="page-cover">
    <div class="cover-card">
      <div class="cover-top">
        <div class="cover-icon">🔔</div>
        <div class="cover-label">User Experience Research</div>
        <h1 class="cover-title">푸시 알림<br>사용자 경험 조사</h1>
        <p class="cover-subtitle">쇼핑 앱 푸시 알림에 대한 인식과<br>선호도를 알아보는 설문입니다.</p>
      </div>
      <div class="cover-body">
        <div class="cover-info-grid">
          <div class="cover-info-item">
            <div class="cover-info-label">총 문항 수</div>
            <div class="cover-info-value">18문항</div>
          </div>
          <div class="cover-info-item">
            <div class="cover-info-label">예상 소요 시간</div>
            <div class="cover-info-value">약 5~7분</div>
          </div>
          <div class="cover-info-item">
            <div class="cover-info-label">섹션 수</div>
            <div class="cover-info-value">5개 섹션</div>
          </div>
          <div class="cover-info-item">
            <div class="cover-info-label">선호도 조사 포함</div>
            <div class="cover-info-value">알림 6종 비교</div>
          </div>
        </div>
        <div class="cover-notice">
          <strong>안내</strong><br>
          수집된 응답은 연구 목적으로만 사용되며,
          개인정보는 안전하게 보호됩니다.
          설문 완료 후 추첨을 통해 기프티콘을 드립니다.
        </div>
        <button class="btn-start" onclick="startSurvey()">설문 시작하기 →</button>
        <button class="btn-researcher" onclick="showLogin()">리서처 결과 보기</button>
      </div>
    </div>
  </div>

  <!-- 리서처 로그인 -->
  <div class="page" id="page-login">
    <div class="login-card">
      <h2 class="login-title">리서처 로그인</h2>
      <p class="login-sub">설문 결과를 보려면 비밀번호를 입력하세요.</p>
      <div style="margin-bottom:16px;">
        <input class="text-input" type="password" id="pw-input" placeholder="비밀번호 입력" />
        <div class="login-error" id="login-error">비밀번호가 올바르지 않아요.</div>
      </div>
      <button class="btn-next btn-purple" style="width:100%;margin-bottom:10px;" onclick="checkPW()">확인</button>
      <button class="btn-researcher" onclick="showPage('page-cover')">← 돌아가기</button>
    </div>
  </div>

  <!-- 결과 페이지 -->
  <div class="page" id="page-result">
    <div class="result-card">
      <div class="result-header">

  if (code < 0xAC00 || code > 0xD7A3) return false;
  return (code - 0xAC00) % 28 !== 0;
}

    ]
  },
  {

    steps:[
      { type:'radio', q:'조사 결과에 따라 후속 인터뷰를 진행할 예정입니다. 참여하실 의향이 있으십니까?', sub:'참여자 대상으로 소정의 사례를 드립니다.', options:['예','아니오'], key:'interview' },

    ]
  }
];

const shortQs = [

  ['이름','1순위 알림','2순위 알림','비선호 알림'],

  ['인터뷰 참여 의향','인터뷰 연락처','이벤트 연락처']
];

let secIdx = 0, stepIdx = 0;
let answers = [];
const totalQ = sections.reduce((a, s) => a + s.steps.length, 0);

function initAnswers() {
  answers = sections.map(s => s.steps.map(st => {
    if (st.type === 'checkbox' || st.type === 'checkbox-other') return [];
    if (['textarea','text-input','name-input'].includes(st.type)) return '';
    return null;
  }));
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startSurvey() {
  secIdx = 0; stepIdx = 0;
  initAnswers();
  document.getElementById('survey-card').innerHTML =
    '<div id="section-header-area"></div><div id="progress-area"></div>' +
    '<div class="card-body" id="question-area"></div>' +
    '<div class="nav-row"><button class="btn-back" id="btn-back" onclick="goBack()">← 이전</button>' +
    '<button class="btn-next btn-blue" id="btn-next" onclick="goNext()" disabled>다음</button></div>';
  render();
  showPage('page-survey');
}

function showLogin() { showPage('page-login'); }

function checkPW() {
  const val = document.getElementById('pw-input').value;
if (val === PW) {
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('pw-input').value = '';
  genderFilter = '전체'; ageFilter = '전체'; currentTab = 'overview';

  if (window.loadFromFirebase) {
    window.loadFromFirebase().then(data => {
      allResponses = data;
      renderResultPage();
      showPage('page-result');
    });
  } else {
    renderResultPage();
    showPage('page-result');
  }

} else {
    document.getElementById('login-error').style.display = 'block';
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPW(); });

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('on', b.dataset.tab === tab));
  ['overview','gender','age','pref','responses'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  renderResultPage();
}

function renderResultPage() {
  const total = allResponses.length;
  const formalCnt = allResponses.filter(r => ['n1','n2','n3'].includes(r.notifPick)).length;
  const casualCnt = allResponses.filter(r => ['n4','n5','n6'].includes(r.notifPick)).length;

  document.getElementById('stat-grid').innerHTML =
    '<div class="stat-card"><div class="stat-num">' + total + '</div><div class="stat-lbl">총 응답 수</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + formalCnt + '</div><div class="stat-lbl">정중체 선호</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + casualCnt + '</div><div class="stat-lbl">친근체 선호</div></div>';

  const metaNotifs = buildNotifs('OO','남','20대');

  if (currentTab === 'overview') {
    renderNotifTable('tab-overview', allResponses, metaNotifs, true);
  }
  if (currentTab === 'gender') {
    let html = '<div class="r-section-label">성별 필터</div><div class="filter-bar">';
    ['전체',...GENDERS].forEach(v => {
      html += '<button class="filter-chip' + (v === genderFilter ? ' on' : '') + '" onclick="genderFilter=\'' + v + '\';renderResultPage();">' + v + '</button>';
    });
    html += '</div>';
    document.getElementById('tab-gender').innerHTML = html;
    const sub = genderFilter === '전체' ? allResponses : allResponses.filter(r => r.gender === genderFilter);
    renderNotifTable('tab-gender', sub, metaNotifs, false, true);
  }
  if (currentTab === 'age') {
    let html = '<div class="r-section-label">연령대 필터</div><div class="filter-bar">';
    ['전체',...AGES].forEach(v => {
      html += '<button class="filter-chip' + (v === ageFilter ? ' on' : '') + '" onclick="ageFilter=\'' + v + '\';renderResultPage();">' + v + '</button>';
    });
    html += '</div>';
    document.getElementById('tab-age').innerHTML = html;
    const sub = ageFilter === '전체' ? allResponses : allResponses.filter(r => r.age === ageFilter);
    renderNotifTable('tab-age', sub, metaNotifs, false, false, true);
  }
  if (currentTab === 'pref') {
    if (!total) { document.getElementById('tab-pref').innerHTML = '<div class="empty-state">아직 응답이 없어요.</div>'; return; }

    const c1 = {}, c2 = {}, cW = {};
    NIDS.forEach(id => { c1[id]=0; c2[id]=0; cW[id]=0; });

      if (r.notifPick  && c1[r.notifPick])  c1[r.notifPick]++;  else if(r.notifPick)  c1[r.notifPick]=1;
      if (r.notifPick2 && c2[r.notifPick2]) c2[r.notifPick2]++; else if(r.notifPick2) c2[r.notifPick2]=1;
      if (r.notifWorst && cW[r.notifWorst]) cW[r.notifWorst]++; else if(r.notifWorst) cW[r.notifWorst]=1;
    });
    const metaNotifs = buildNotifs('OO','남','20대');
    const makeTable = (label, counts, barColor) => {
      let html = '<p class="r-section-label">' + label + '</p><table class="result-table"><thead><tr><th>#</th><th>알림 유형</th><th>톤</th><th>이름</th><th>선택</th><th style="width:100px;">비율</th></tr></thead><tbody>';
      metaNotifs.forEach((n, i) => {
        const cnt = counts[n.id] || 0, pct = total > 0 ? Math.round((cnt/total)*100) : 0;
        html += '<tr><td style="color:#A09E98;">' + (i+1) + '</td>' +
          '<td style="font-size:11px;color:#1A1917;">' + NOTIF_LABELS[i] + '</td>' +
          '<td><span class="tag ' + (n.tone==='정중체'?'tag-formal':'tag-casual') + '">' + n.tone + '</span></td>' +
          '<td>' + (n.hasName ? '<span class="tag tag-name">포함</span>' : '<span class="tag tag-none">없음</span>') + '</td>' +
          '<td style="font-weight:700;color:#1A1917;">' + cnt + '</td>' +
          '<td><div class="bar-row"><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + barColor + ';"></div></div><span class="bar-pct">' + pct + '%</span></div></td>' +
          '</tr>';
      });
      return html + '</tbody></table>';
    };
    document.getElementById('tab-pref').innerHTML =
      makeTable('1순위 선호 알림', c1, '#534AB7') +
      makeTable('2순위 선호 알림', c2, '#1D9E75') +
      makeTable('가장 비선호 알림', cW, '#E24B4A');
  }
  if (currentTab === 'responses') {

      '<div class="r-section-label" style="margin:0;">참여자별 응답</div>' +
      '<div style="display:flex;align-items:center;gap:8px;">' +
      '<span style="font-size:12px;color:#A09E98;">체크 후 삭제</span>' +
      '<button onclick="deleteSelected()" style="font-size:12px;font-weight:700;padding:5px 14px;border-radius:99px;background:#FCEBEB;color:#A32D2D;border:1px solid #F09595;cursor:pointer;font-family:inherit;">선택 삭제</button>' +
      '</div></div>';

      const pick2Idx = ['n1','n2','n3','n4','n5','n6'].indexOf(r.notifPick2);
      const worstIdx = ['n1','n2','n3','n4','n5','n6'].indexOf(r.notifWorst);
      const row = (label, val) => val ? '<div style="display:flex;gap:6px;padding:4px 0;border-bottom:1px solid rgba(0,0,0,0.05);font-size:12px;"><span style="color:#A09E98;flex-shrink:0;min-width:110px;">' + label + '</span><span style="color:#1A1917;">' + val + '</span></div>' : '';
      html += '<div class="resp-item" style="display:flex;align-items:flex-start;gap:10px;">' +
        '<input type="checkbox" class="resp-check" data-idx="' + realIdx + '" style="margin-top:3px;flex-shrink:0;width:16px;height:16px;cursor:pointer;accent-color:#A32D2D;" />' +
        '<div style="flex:1;">' +
        '<div class="resp-name" style="margin-bottom:6px;">' + displayNum + '. ' + (r.expName || '(미입력)') + ' <span class="resp-meta">' + r.gender + ' · ' + r.age + '</span></div>' +
        '<div style="background:#fff;border-radius:8px;padding:6px 10px;margin-bottom:6px;">' +
        row('앱 이용 빈도', r.appUsage) +
        row('알림 설정', r.notifOnOff) +
        row('알림 수신 이유', r.notifReason) +
        row('알림 인식', r.notifFeeling) +
        row('알림 해제 이유', r.notifOffReason) +
        row('도움이 되는 경우', r.helpCase) +
        row('불편한 경우', r.annoyCase) +
        row('열람 빈도', r.openRate) +
        '</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">' +
        (pickIdx  >= 0 ? '<span class="resp-pick" style="background:#EEEDFE;color:#534AB7;">1순위: ' + NOTIF_LABELS[pickIdx]  + '</span>' : '') +
        (pick2Idx >= 0 ? '<span class="resp-pick" style="background:#E1F5EE;color:#0F6E56;">2순위: ' + NOTIF_LABELS[pick2Idx] + '</span>' : '') +
        (worstIdx >= 0 ? '<span class="resp-pick" style="background:#FCEBEB;color:#A32D2D;">비선호: ' + NOTIF_LABELS[worstIdx] + '</span>' : '') +
        '</div>' +
        '<div style="background:#fff;border-radius:8px;padding:6px 10px;">' +
        row('비교 앱', r.compareApp) +
        row('비교 느낌', r.compareFeeling) +
        (r.compareFeelingOther ? row('기타 느낌', r.compareFeelingOther) : '') +
        row('비교 도움도', r.compareHelp) +
        row('비교 특성', r.compareFeature) +
        row('인터뷰 참여', r.interviewWilling) +
        row('인터뷰 연락처', r.interviewContact) +
        row('이벤트 연락처', r.eventContact) +
        '</div>' +
        '</div></div>';
    });
    el.innerHTML = html;
  }
}

function deleteSelected() {
  const checked = document.querySelectorAll('.resp-check:checked');
  if (!checked.length) { alert('삭제할 응답을 선택해주세요.'); return; }
  const idxs = Array.from(checked).map(c => parseInt(c.dataset.idx));
  if (!confirm(idxs.length + '개의 응답을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) return;
  allResponses = allResponses.filter((_, i) => !idxs.includes(i));
  renderResultPage();
}

function renderNotifTable(containerId, subset, metaNotifs, showNameCol, append, append2) {
  const counts = {}; ['n1','n2','n3','n4','n5','n6'].forEach(id => counts[id] = 0);
  subset.forEach(r => { if (r.notifPick && counts[r.notifPick] !== undefined) counts[r.notifPick]++; });
  const total = subset.length;
  const nameColHead = showNameCol ? '<th>이름 포함</th>' : '';
  let html = '<div class="r-section-label">알림별 선택 현황</div><table class="result-table"><thead><tr><th>#</th><th>알림</th><th>톤</th>' + nameColHead + '<th>선택</th><th style="width:100px;">비율</th></tr></thead><tbody>';
  metaNotifs.forEach((n, i) => {
    const cnt = counts[n.id], pct = total > 0 ? Math.round((cnt/total)*100) : 0;
    const nameCol = showNameCol ? '<td>' + (n.hasName ? '<span class="tag tag-name">포함</span>' : '<span class="tag tag-none">없음</span>') + '</td>' : '';
    html += '<tr><td style="color:#A09E98;">' + (i+1) + '</td>' +
      '<td style="font-size:11px;color:#1A1917;word-break:keep-all;">' + NOTIF_LABELS[i] + '</td>' +
      '<td><span class="tag ' + (n.tone==='정중체'?'tag-formal':'tag-casual') + '">' + n.tone + '</span></td>' +
      nameCol +
      '<td style="font-weight:700;color:#1A1917;">' + cnt + '</td>' +
      '<td><div class="bar-row"><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div><span class="bar-pct">' + pct + '%</span></div></td>' +
      '</tr>';
  });
  html += '</tbody></table>';
  if (append || append2) {
    document.getElementById(containerId).innerHTML += html;
  } else {
    document.getElementById(containerId).innerHTML = html;
  }
}

/* 설문 로직 */
function curSec()  { return sections[secIdx]; }
function curStep() { return curSec().steps[stepIdx]; }
function curAns()  { return answers[secIdx][stepIdx]; }
function globalStep() {
  let g = 0;
  for (let i = 0; i < secIdx; i++) g += sections[i].steps.length;
  return g + stepIdx;
}
function isStepSkipped(si, qi) {
  const st = sections[si].steps[qi];
  if (!st.condKey) return false;
  const cSteps = sections[4].steps;
  const condIdx = cSteps.findIndex(s => s.key === st.condKey);
  return answers[4][condIdx] !== st.condVal;
}
function getExcludedIds() {
  const pref = answers[2];
  const excluded = [];
  if (pref[1] !== null) excluded.push(pref[1]);
  if (pref[2] !== null) excluded.push(pref[2]);
  return excluded;
}

function isAnswered() {
  const st = curStep();
  if (isStepSkipped(secIdx, stepIdx)) return true;
  if (st.optional) return true;
  if (st.type === 'checkbox' || st.type === 'checkbox-other') return (Array.isArray(curAns()) ? curAns() : []).length > 0;
  if (st.type === 'checkbox-other') {
    const arr = curAns();
    if (!arr.length) return false;
    if (arr.includes(st.otherIdx)) {
      return typeof arr.otherText === 'string' && arr.otherText.trim().length > 0;
    }
    return true;
  }
  if (st.type === 'textarea' || st.type === 'name-input') return curAns().trim().length > 0;
  if (st.type === 'text-input') {
    if (st.required) return curAns().trim().length > 0;
    return true;
  }
  if (st.type === 'notif-pick') return curAns() !== null;
  return curAns() !== null;
}
function getExpName() { return answers[2] && answers[2][0] !== undefined ? (answers[2][0] || '') : ''; }
function getGender()  { const a = answers[0][0]; return a !== null ? ['남','여'][a] : ''; }
function getAge()     { const a = answers[0][1]; return a !== null ? ['10대','20대','30대','40대','50대 이상'][a] : ''; }

function render() {
  const sec = curSec(), st = curStep();
  document.getElementById('section-header-area').innerHTML =
    '<div class="section-header">' +
    '<div class="section-badge ' + sec.badgeClass + '">' + sec.badge + '</div>' +
    '<p class="section-title">' + sec.title + '</p>' +
    '<p class="section-desc">' + sec.desc + '</p>' +
    '</div>';

  const progressSegs = sections.map((s, si) => {
    const ratio = s.steps.length / totalQ;
    const widthPct = Math.round(ratio * 100);
    let fillPct = si < secIdx ? 100 : (si === secIdx ? Math.round((stepIdx / s.steps.length) * 100) : 0);
    return '<div class="prog-seg" style="width:calc(' + widthPct + '% - 18px)">' +
      '<div class="prog-fill ' + s.fillClass + '" style="width:' + fillPct + '%"></div></div>';
  }).join('<span class="prog-sep">›</span>');

  document.getElementById('progress-area').innerHTML =
    '<div class="progress-row">' + progressSegs +
    '<span class="prog-label">' + (globalStep() + 1) + ' / ' + totalQ + '</span></div>';

  const skipped    = isStepSkipped(secIdx, stepIdx);
  const optBadge   = st.optional && !skipped ? '<span class="optional-badge">선택</span>' : '';
  const limitBadge = st.max && st.max < (st.options || []).length ? '<span class="limit-badge">최대 ' + st.max + '개</span>' : '';
  const hintHtml   = st.hint ? '<p class="q-hint">' + st.hint + '</p>' : '<div class="q-spacer"></div>';
  const subHtml    = st.sub ? '<p class="q-sub">' + st.sub + '</p>' : '';

  let bodyHtml = '<div class="q-title-row"><p class="q-text">' + st.q + '</p>' +
    (limitBadge || '') + (optBadge || '') + '</div>' + subHtml;

  if (st.type === 'textarea') {
    bodyHtml += hintHtml + '<textarea class="text-area" id="textarea-input" placeholder="' + (st.placeholder||'') + '" oninput="onTextInput(this.value)">' + curAns() + '</textarea>';
    if (st.optional) bodyHtml += '<p class="optional-note">선택 질문입니다. 건너뛰어도 됩니다.</p>';
  } else if (st.type === 'name-input') {
    const ex = st.nameExample;
    bodyHtml += hintHtml +
      '<div class="name-example">' +
      '예시: <span>' + ex.full + '</span>' +
      '<span class="name-example-arrow">→</span>' +
      '<span class="name-example-highlight">' + ex.short + '</span>' +
      '<span style="color:#A09E98;font-size:12px;">성을 제외한 이름만 입력해주세요.</span>' +
      '</div>' +
      '<input class="text-input" id="name-exp-input" type="text" maxlength="10" placeholder="' + (st.placeholder||'') + '" value="' + curAns() + '" oninput="onTextInput(this.value)" />';
  } else if (st.type === 'text-input') {
    if (skipped) {
      bodyHtml += '<div class="info-box">인터뷰 미참여를 선택하셔서 이 질문은 건너뜁니다. 다음 버튼을 눌러 계속하세요.</div>';
    } else {
      bodyHtml += '<div class="q-spacer"></div><input class="text-input" id="text-input" type="text" placeholder="' + (st.placeholder||'') + '" value="' + curAns() + '" oninput="onTextInput(this.value)" />';
      if (st.optional) bodyHtml += '<p class="optional-note">입력하지 않으셔도 다음 단계로 넘어갈 수 있습니다.</p>';
    }
  } else if (st.type === 'notif-pick') {
    bodyHtml += hintHtml + '<div class="notif-list" id="notif-list"></div>';
  } else if (st.type === 'checkbox-other') {
    bodyHtml += hintHtml + '<div class="option-list" id="options"></div><div id="other-input-wrap" style="display:none;margin-top:10px;"><input class="text-input" id="other-text-input" type="text" placeholder="기타 이유를 입력해 주세요." oninput="onOtherInput(this.value)" /></div>';
  } else {
    bodyHtml += hintHtml + '<div class="option-list" id="options"></div>';
  }

  document.getElementById('question-area').innerHTML = bodyHtml;

  if (st.type === 'notif-pick') {
    const rank = st.pickRank || 1;
    const allNotifs = buildNotifs(getExpName(), getGender(), getAge());
    const excluded = [];
    if (rank >= 2 && answers[2][1] !== null) excluded.push(answers[2][1]);
    if (rank >= 3 && answers[2][2] !== null) excluded.push(answers[2][2]);
    const notifs = allNotifs.filter(n => !excluded.includes(n.id));
    const list = document.getElementById('notif-list');
    notifs.forEach((n, i) => {
      const card = document.createElement('div');
      card.className = 'notif-card' + (curAns() === n.id ? ' notif-selected' : '');
      card.innerHTML =
        '<div class="notif-app-icon">🛍️</div>' +
        '<div class="notif-body">' +
          '<div class="notif-top"><div class="notif-title-text">' + n.title + '</div><div class="notif-time">방금 전</div></div>' +
          '<div class="notif-msg"><span class="notif-ad">(광고) </span>' + n.body + '</div>' +
          '<div class="notif-unsub">수신거부: MY &gt; 설정</div>' +
        '</div>' +
        '<div class="notif-radio"><div class="notif-radio-inner"></div></div>';
      card.onclick = () => selectNotif(n.id, i);
      list.appendChild(card);
    });
  } else if (!['textarea','text-input','name-input','notif-pick','checkbox-other'].includes(st.type)) {
    const ol = document.getElementById('options');
    st.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      const isSel = st.type === 'checkbox' ? curAns().includes(i) : curAns() === i;
      btn.className = 'option-btn' + (isSel ? ' ' + sec.selClass : '');
      if (st.type === 'checkbox') {
        btn.innerHTML = '<span class="check-box"><svg class="check-inner" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>' + opt + '</span>';
        btn.onclick = () => toggleCheck(i);
      } else {
        btn.innerHTML = '<span class="radio-dot"><span class="radio-inner"></span></span><span>' + opt + '</span>';
        btn.onclick = () => selectOption(i);
      }
      ol.appendChild(btn);
    });
  }

  if (st.type === 'checkbox-other') {
    const ol = document.getElementById('options');
    const arr = curAns();
    st.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      const isSel = arr.includes(i);
      btn.className = 'option-btn' + (isSel ? ' ' + sec.selClass : '');
      btn.innerHTML = '<span class="check-box"><svg class="check-inner" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>' + opt + '</span>';
      btn.onclick = () => toggleCheckOther(i);
      ol.appendChild(btn);
    });
    const wrap = document.getElementById('other-input-wrap');
    const otherSel = arr.includes(st.otherIdx);
    wrap.style.display = otherSel ? 'block' : 'none';
    if (otherSel && arr.otherText) {
      document.getElementById('other-text-input').value = arr.otherText;
    }
  }

  const isFirst = secIdx === 0 && stepIdx === 0;
  const isLast  = secIdx === sections.length - 1 && stepIdx === curSec().steps.length - 1;
  const isSectionEnd = stepIdx === curSec().steps.length - 1 && secIdx < sections.length - 1;

  document.getElementById('btn-back').style.visibility = isFirst ? 'hidden' : 'visible';
  const nb = document.getElementById('btn-next');
  nb.disabled = !isAnswered();
  nb.className = 'btn-next ' + sec.btnClass;
  const nextTitle = isSectionEnd ? sections[secIdx + 1].title : '';
  function endsWithBatchim(s) {
    if (!s) return false;
    const c = s.charCodeAt(s.length - 1);
    return c >= 0xAC00 && c <= 0xD7A3 && (c - 0xAC00) % 28 !== 0;
  }
  const particle = endsWithBatchim(nextTitle) ? '으로' : '로';
  nb.textContent = isLast ? '제출하기' : (isSectionEnd ? nextTitle + particle + ' →' : '다음');
}

function onEtcInput(val) {
  const st = curStep();
  if (st) st.etcText = val;
}

function onTextInput(val) {
  answers[secIdx][stepIdx] = val;
  document.getElementById('btn-next').disabled = !isAnswered();
}
function selectOption(i) {
  answers[secIdx][stepIdx] = i;
  document.querySelectorAll('.option-btn').forEach((b, idx) => {
    b.className = 'option-btn' + (idx === i ? ' ' + curSec().selClass : '');
  });
  document.getElementById('btn-next').disabled = false;
}
function toggleCheckOther(i, opt) {
  const arr = curAns();
  const idx = arr.indexOf(i);
  if (idx > -1) arr.splice(idx, 1);
  else { if (arr.length >= curStep().max) return; arr.push(i); }
  document.querySelectorAll('.option-btn').forEach((b, bidx) => {
    b.className = 'option-btn' + (arr.includes(bidx) ? ' ' + curSec().selClass : '');
  });
  // 기타 선택 여부에 따라 입력창 표시
  const etcIdx = curStep().options.indexOf('기타');
  const etcBox = document.getElementById('etc-input-wrap');
  if (etcBox) {
    etcBox.style.display = arr.includes(etcIdx) ? 'block' : 'none';
    if (!arr.includes(etcIdx)) {
      curStep().etcText = '';
      const etcIn = document.getElementById('etc-input');
      if (etcIn) etcIn.value = '';
    }
  }
  document.getElementById('btn-next').disabled = arr.length === 0;
}

function toggleCheck(i) {
  const arr = curAns(), st = curStep();
  const idx = arr.indexOf(i);
  if (idx > -1) arr.splice(idx, 1);
  else { if (arr.length >= st.max) return; arr.push(i); }
  document.querySelectorAll('.option-btn').forEach((b, bidx) => {
    b.className = 'option-btn' + (arr.includes(bidx) ? ' ' + curSec().selClass : '');
  });
  document.getElementById('btn-next').disabled = arr.length === 0;
}
function toggleCheckOther(i) {
  const arr = curAns(), st = curStep();
  const idx = arr.indexOf(i);
  if (idx > -1) arr.splice(idx, 1);
  else { if (arr.length >= st.max) return; arr.push(i); }
  document.querySelectorAll('.option-btn').forEach((b, bidx) => {
    b.className = 'option-btn' + (arr.includes(bidx) ? ' ' + curSec().selClass : '');
  });
  const isOther = arr.includes(st.otherIdx);
  const wrap = document.getElementById('other-input-wrap');
  if (wrap) wrap.style.display = isOther ? 'block' : 'none';
  if (!isOther) delete arr.otherText;
  document.getElementById('btn-next').disabled = !isAnswered();
}
function onOtherInput(val) {
  const arr = curAns();
  arr.otherText = val;
  document.getElementById('btn-next').disabled = !isAnswered();
}
function selectNotif(id, cardIdx) {
  answers[secIdx][stepIdx] = id;
  document.querySelectorAll('.notif-card').forEach((c, i) => {
    c.classList.toggle('notif-selected', i === cardIdx);
  });
  document.getElementById('btn-next').disabled = false;
}
function goNext() {
  if (!isAnswered()) return;
  if (stepIdx < curSec().steps.length - 1) { stepIdx++; render(); }
  else if (secIdx < sections.length - 1) { secIdx++; stepIdx = 0; render(); }
  else submitSurvey();
}
function goBack() {
  if (stepIdx > 0) { stepIdx--; render(); }
  else if (secIdx > 0) { secIdx--; stepIdx = sections[secIdx].steps.length - 1; render(); }
}

function submitSurvey() {
  const NOTIF_IDS = ['n1','n2','n3','n4','n5','n6'];
  const p1 = NOTIF_IDS.indexOf(answers[2][1]);
  const p2 = NOTIF_IDS.indexOf(answers[2][2]);
  const p3 = NOTIF_IDS.indexOf(answers[2][3]);
  const compareFeeling = answers[3][1];
  const compareFeelingOther = Array.isArray(compareFeeling) && compareFeeling.otherText ? compareFeeling.otherText : '';
  allResponses.push({
    gender:              answers[0][0] !== null ? ['남','여'][answers[0][0]] : '',
    age:                 answers[0][1] !== null ? ['10대','20대','30대','40대','50대 이상'][answers[0][1]] : '',
    appUsage:            answers[1][0] !== null ? ['거의 이용 안 함','월 1~2회','주 1회 정도','주 2~3회','거의 매일'][answers[1][0]] : '',
    notifOnOff:          answers[1][1] !== null ? ['대부분 켜둠','일부 앱만 켜둠','거의 꺼둠','잘 모름'][answers[1][1]] : '',
    notifReason:         Array.isArray(answers[1][2]) ? answers[1][2].map(i => ['할인 / 쿠폰','배송 / 주문 상태','추천 상품','재입고 / 품절 해제','이벤트 / 프로모션'][i]).join(', ') : '',
    notifFeeling:        answers[1][3] !== null ? ['매우 유용하다','유용한 편이다','보통이다','다소 불편하다','매우 불편하다'][answers[1][3]] : '',
    notifOffReason:      Array.isArray(answers[1][4]) ? answers[1][4].map(i => ['너무 자주 옴','내용이 별로 유용하지 않음','내용이 사생활 침해처럼 느껴짐','말투가 부담스러움','이모지나 표현이 어색함','기타','끄지 않음'][i]).join(', ') : '',
    helpCase:            answers[1][5] || '',
    annoyCase:           answers[1][6] || '',
    openRate:            answers[1][7] !== null ? ['모두 열어봄','대부분 열어봄','종종 열어봄','거의 열지 않음','전혀 열지 않음'][answers[1][7]] : '',
    expName:             getExpName(),
    notifPick:           answers[2][1] || null,
    notifPick2:          answers[2][2] || null,
    notifWorst:          answers[2][3] || null,
    compareApp:          answers[3][0] !== null ? ['금융','OTT','배달','SNS / 커뮤니티','언어 학습','기타'][answers[3][0]] : '',
    compareFeeling:      Array.isArray(answers[3][1]) ? answers[3][1].map(i => ['더 친근하다','더 광고 같다','더 유용하다','더 부담스럽다','더 자주 온다','더 사생활 침해처럼 느껴진다','차이가 없다','기타'][i]).join(', ') : '',
    compareFeelingOther: compareFeelingOther,
    compareHelp:         answers[3][2] !== null ? ['매우 도움이 된다','다소 도움이 된다','보통이다','다소 도움이 되지 않는다','전혀 도움이 되지 않는다'][answers[3][2]] : '',
    compareFeature:      answers[3][3] || '',
    interviewWilling:    answers[4][0] !== null ? ['예','아니오'][answers[4][0]] : '',
    interviewContact:    answers[4][1] || '',
    eventContact:        answers[4][2] || ''
  });

  if (window.saveToFirebase) {
    window.saveToFirebase({
      q01_성별:              answers[0][0] !== null ? ['남','여'][answers[0][0]] : '',
      q02_연령대:             answers[0][1] !== null ? ['10대','20대','30대','40대','50대 이상'][answers[0][1]] : '',
      q03_쇼핑앱이용빈도:     answers[1][0] !== null ? ['거의 이용 안 함','월 1~2회','주 1회 정도','주 2~3회','거의 매일'][answers[1][0]] : '',
      q04_알림설정여부:       answers[1][1] !== null ? ['대부분 켜둠','일부 앱만 켜둠','거의 꺼둠','잘 모름'][answers[1][1]] : '',
      q05_알림수신이유:       Array.isArray(answers[1][2]) ? answers[1][2].map(i => ['할인 / 쿠폰','배송 / 주문 상태','추천 상품','재입고 / 품절 해제','이벤트 / 프로모션'][i]).join(', ') : '',
      q06_알림인식:           answers[1][3] !== null ? ['매우 유용하다','유용한 편이다','보통이다','다소 불편하다','매우 불편하다'][answers[1][3]] : '',
      q07_알림해제이유:       Array.isArray(answers[1][4]) ? answers[1][4].map(i => ['너무 자주 옴','내용이 별로 유용하지 않음','내용이 사생활 침해처럼 느껴짐','말투가 부담스러움','이모지나 표현이 어색함','기타','끄지 않음'][i]).join(', ') : '',
      q08_도움이되는경우:     answers[1][5] || '',
      q09_불편한경우:         answers[1][6] || '',
      q10_알림열람빈도:       answers[1][7] !== null ? ['모두 열어봄','대부분 열어봄','종종 열어봄','거의 열지 않음','전혀 열지 않음'][answers[1][7]] : '',
      q11_이름:              getExpName(),
      q12_선호도1순위:        answers[2][1] || null,
      q13_선호도2순위:        answers[2][2] || null,
      q14_비선호알림:         answers[2][3] || null,
      q15_비교앱유형:         answers[3][0] !== null ? ['금융','OTT','배달','SNS / 커뮤니티','언어 학습','기타'][answers[3][0]] : '',
      q16_비교느낌:           Array.isArray(answers[3][1]) ? answers[3][1].map(i => ['더 친근하다','더 광고 같다','더 유용하다','더 부담스럽다','더 자주 온다','더 사생활 침해처럼 느껴진다','차이가 없다','기타'][i]).join(', ') : '',
      q16_비교느낌_기타:      compareFeelingOther,
      q17_비교도움도:         answers[3][2] !== null ? ['매우 도움이 된다','다소 도움이 된다','보통이다','다소 도움이 되지 않는다','전혀 도움이 되지 않는다'][answers[3][2]] : '',
      q18_비교특성:           answers[3][3] || '',
      q19_인터뷰참여의향:     answers[4][0] !== null ? ['예','아니오'][answers[4][0]] : '',
      q20_인터뷰연락처:       answers[4][1] || '',
      q21_이벤트연락처:       answers[4][2] || ''
    });
  }
  const card = document.getElementById('survey-card');
  const secBlocks = sections.map((sec, si) => {
    const rows = sec.steps.map((st, qi) => {
      if (isStepSkipped(si, qi)) return '';
      let ans = '';
      if (st.type === 'checkbox') ans = answers[si][qi].length ? answers[si][qi].map(idx => st.options[idx]).join(', ') : '(미응답)';
      else if (st.type === 'checkbox-other') {
        const arr = answers[si][qi];
        if (!arr.length) { ans = '(미응답)'; }
        else {
          const labels = arr.map(idx => st.options[idx]);
          if (arr.otherText) labels[labels.indexOf('기타')] = '기타: ' + arr.otherText;
          ans = labels.join(', ');
        }
      }
      else if (['textarea','text-input','name-input'].includes(st.type)) ans = answers[si][qi].trim() || '(미작성)';
      else if (st.type === 'notif-pick') {
        const NIDS = ['n1','n2','n3','n4','n5','n6'];
        const idx = NIDS.indexOf(answers[si][qi]);
        ans = idx >= 0 ? NOTIF_LABELS[idx] : '(미응답)';
      } else ans = answers[si][qi] !== null ? st.options[answers[si][qi]] : '(미응답)';
      const isEmpty = ans === '(미응답)' || ans === '(미작성)';
      return '<div class="res-row"><span class="res-q">' + shortQs[si][qi] + '</span><span class="res-a' + (isEmpty ? ' empty' : '') + '">' + ans + '</span></div>';
    }).join('');
    return '<div class="res-section"><p class="res-section-label">' + sec.badge + '</p><div class="res-box">' + rows + '</div></div>';
  }).join('');

  card.innerHTML =
    '<div class="thank-wrap">' +
    '<div class="thank-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M5 12l4 4L19 8" stroke="#3B6D11" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>' +
    '<p class="thank-title">설문이 완료되었습니다!</p>' +
    '<p class="thank-msg">귀한 시간 내어 설문에 응해주셔서<br>진심으로 감사합니다.</p>' +
    secBlocks +
    '<button class="btn-restart" onclick="startSurvey()">다시 응답하기</button>' +
    '<button class="btn-restart" style="margin-left:8px;" onclick="showPage(\'page-cover\')">표지로 돌아가기</button>' +
    '</div>';
}
</script>

  // ✅ 여기를 본인의 firebaseConfig로 교체
   const firebaseConfig = {

      authDomain: "push-notification-648ca.firebaseapp.com",
      projectId: "push-notification-648ca",

    };
  
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  
  window.saveToFirebase = async function(data) {
    try {
      await addDoc(collection(db, 'survey_responses'), {
        ...data,
        submittedAt: new Date().toISOString()
      });
      console.log('✅ 저장 완료');
    } catch(e) {
      console.error('❌ 저장 실패', e);
    }
  };

  window.loadFromFirebase = async function() {
    try {
      const q = query(collection(db, 'survey_responses'), orderBy('submittedAt', 'desc'));
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) {
      console.error('❌ 불러오기 실패', e);
      return [];
    }
  };
</script>
